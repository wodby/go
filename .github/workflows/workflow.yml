name: Build docker image

on:
  push:
    branches:
      - master

    tags:
      - '*'

  pull_request:

env:
  GO126: '1.26.5'
  GO125: '1.25.11'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      go-versions: ${{ steps.set-matrix.outputs.go-versions }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > versions.json
          [
            {"key": "go126", "version": "${{ env.GO126 }}", "latest": "latest", "latest_major": "1"},
            {"key": "go125", "version": "${{ env.GO125 }}", "latest": "", "latest_major": ""}
          ]
          EOF
          echo "go-versions=$(jq -c . versions.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      matrix:
        go: ${{ fromJson(needs.setup.outputs.go-versions) }}
        arch:
          - amd64
          - arm64
        dev:
          - ''
          - 'dev'
        user_id:
          - 1000
          - 501
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
          - user_id: 501
            group_id: 20
            dev: dev
        exclude:
          - dev: ''
            user_id: 501
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push
        env:
          GO_VER: ${{ matrix.go.version }}
          ARCH: ${{ matrix.arch }}
          GO_DEV: ${{ matrix.dev }}
          WODBY_USER_ID: ${{ matrix.user_id }}
          WODBY_GROUP_ID: ${{ matrix.group_id }}
        run: |
          make
          make test
          make push

  push:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
    strategy:
      matrix:
        go: ${{ fromJson(needs.setup.outputs.go-versions) }}
        dev:
          - ''
          - 'dev'
        user_id:
          - 1000
          - 501
        exclude:
          - dev: ''
            user_id: 501
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ./.github/actions
        with:
          version: ${{ matrix.go.version }}
          dev: ${{ matrix.dev }}
          user_id: ${{ matrix.user_id }}
          latest: ${{ matrix.go.latest }}
          latest_major: ${{ matrix.go.latest_major }}
